<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>۴۰۳ — دسترسی ممنوع | شایان طاهرخانی</title>
  <meta name="description" content="دسترسی به این صفحه محدود شده است. اگر فکر می‌کنید اشتباهی رخ داده با مدیر سایت تماس بگیرید." />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0D0D0F;--card:rgba(22,24,28,0.92);--accent:#ffb86b;--muted:#A1A1A6;--text:#F5F5F7}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(180deg,#060606,#0f1113);color:var(--text);font-family:'Vazirmatn',sans-serif;display:flex;align-items:center;justify-content:center;padding:30px}
    .card{background:var(--card);border-radius:16px;padding:36px;max-width:860px;width:100%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
    .code{font-size:4.6rem;font-weight:900;color:var(--accent)}
    h1{font-size:1.3rem;margin-top:6px}
    p{color:var(--muted);margin-top:10px}
    .btn{display:inline-block;margin-top:18px;padding:12px 16px;border-radius:10px;background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.06);text-decoration:none}
    .spark{position:absolute;right:-8%;top:-6%;width:30vmax;height:30vmax;background:radial-gradient(circle at 20% 20%, rgba(255,184,107,0.06), transparent 15%);filter:blur(36px);transform:rotate(10deg)}
    @media (max-width:600px){.code{font-size:3rem}}
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="spark" aria-hidden="true"></div>
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
      <div class="code">۴۰۳</div>
      <div>
        <h1>دسترسی شما به این صفحه محدود شده است.</h1>
        <p>اگر فکر می‌کنید این پیام اشتباه است، لطفاً با مدیر سایت تماس بگیرید یا بعداً مجدداً تلاش کنید.</p>
        <a class="btn" href="/">بازگشت به صفحه اصلی</a>
      </div>
    </div>
  </div>
</body>
</html>
