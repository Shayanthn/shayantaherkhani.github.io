<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>۵۰۲ — گیت‌وی نامعتبر | شایان طاهرخانی</title>
  <meta name="description" content="ارتباط با سرور واسط با مشکل روبه‌رو شد (۵۰۲). لطفاً بعداً تلاش کنید." />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#071020;--card:rgba(15,18,22,0.9);--accent:#60a5fa;--muted:#94a3b8;--text:#ECF2FF}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(180deg,#03040b,#071020);color:var(--text);font-family:'Vazirmatn',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--card);padding:32px;border-radius:14px;max-width:860px;width:100%;position:relative;box-shadow:0 14px 44px rgba(2,6,23,0.7)}
    .code{font-size:4.6rem;color:var(--accent);font-weight:800}
    h1{font-size:1.3rem}
    p{color:var(--muted);margin-top:10px}
    .glow{position:absolute;left:-6%;top:-8%;width:36vmax;height:36vmax;background:radial-gradient(circle at 30% 30%, rgba(96,165,250,0.06), transparent 18%);filter:blur(26px);animation:glide 7s linear infinite}
    @keyframes glide{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
    .btn{display:inline-block;margin-top:16px;padding:10px 14px;border-radius:9px;background:linear-gradient(90deg,#60a5fa,#38bdf8);color:#021124;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="glow" aria-hidden="true"></div>
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
      <div class="code">۵۰۲</div>
      <div>
        <h1>درگاه (Gateway) پاسخ معتبر دریافت نکرد.</h1>
        <p>این مشکل موقتی است. در حالی که ما در حال بررسی هستیم، می‌توانید بعداً مجدداً تلاش کنید یا به صفحهٔ اصلی بازگردید.</p>

        <form action="/" method="get" role="search" aria-label="جستجوی سایت" style="margin-top:12px;display:flex;gap:8px;max-width:480px">
          <input name="s" type="search" placeholder="جستجو در سایت..." aria-label="جستجو" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text)">
          <button type="submit" class="btn">جستجو</button>
        </form>

        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <a class="btn" href="/">بازگشت به خانه</a>
          <a class="ghost" href="/">فهرست مقالات</a>
          <a class="ghost" href="mailto:admin@shayantaherkhani.ir">گزارش مشکل</a>
        </div>
      </div>
    </div>

    <div aria-hidden="true" style="position:absolute;right:18px;bottom:18px;">
      <svg width="60" height="60" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="14" stroke="#60a5fa" stroke-width="2" fill="rgba(96,165,250,0.02)"></circle>
        <path d="M20 22l4 4 8-8" stroke="#60a5fa" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/>
        </path>
      </svg>
    </div>
  </div>
</body>
</html>
