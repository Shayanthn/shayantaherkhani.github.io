<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Research — Shayan Taherkhani | AI & LLM Studies</title>
  <meta name="description" content="Research by Shayan Taherkhani on large language models, evaluation techniques, prompt engineering methods, and applied AI systems." />
  <link rel="canonical" href="https://shayantaherkhani.ir/research/" />
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Manrope:wght@400;500;600&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg-color: #0D0D0F;
      --card-background: rgba(22, 24, 28, 0.55);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-primary: #F5F5F7;
      --text-secondary: #A1A1A6;
      --accent-hover: rgba(255, 255, 255, 0.08);
      --card-glow: 0 0 50px rgba(144, 53, 212, 0.15), 0 0 20px rgba(69, 97, 219, 0.15);
      --font-heading: 'Cinzel', serif;
      --font-body: 'Manrope', sans-serif;
    }
    
    body.light-mode {
      --bg-color: #F0F2F5;
      --card-background: rgba(255, 255, 255, 0.5);
      --border-color: rgba(0, 0, 0, 0.1);
      --text-primary: #1D1D1F;
      --text-secondary: #515154;
      --accent-hover: rgba(0, 0, 0, 0.05);
      --card-glow: 0 0 50px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Background Effects */
    .aurora-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .shape { position: absolute; border-radius: 50%; filter: blur(120px); }
    .shape-1 { width: 450px; height: 450px; top: -50px; left: -100px; background: radial-gradient(circle, rgba(69, 97, 219, 0.4) 0%, rgba(69, 97, 219, 0) 70%); animation: move-1 20s infinite alternate; }
    .shape-2 { width: 400px; height: 400px; bottom: -80px; right: -120px; background: radial-gradient(circle, rgba(144, 53, 212, 0.4) 0%, rgba(144, 53, 212, 0) 70%); animation: move-2 25s infinite alternate-reverse; }
    @keyframes move-1 { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(150px, 50px) rotate(60deg); } }
    @keyframes move-2 { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(-100px, -50px) rotate(-40deg); } }

    /* Layout & Utilities */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .back-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      padding: 10px 18px;
      background: var(--card-background);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      z-index: 10;
    }
    .back-btn:hover { transform: translateX(-5px); background: var(--accent-hover); }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 50px;
      width: 100%;
    }
    .header h1 {
      font-family: var(--font-heading);
      font-size: 48px;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }
    .header p { color: var(--text-secondary); font-size: 18px; max-width: 600px; margin: 0 auto; line-height: 1.6; }

    /* Research Grid */
    .research-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
      width: 100%;
    }

    .research-card {
      background: var(--card-background);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .research-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--card-glow);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .research-title {
      font-family: var(--font-heading);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      line-height: 1.4;
      transition: color 0.3s ease;
    }
    
    .research-title:hover { color: #89f7fe; }

    .research-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
    }
    .research-meta span i { margin-right: 5px; color: #66a6ff; }

    .research-abstract {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }

    .research-footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(144, 53, 212, 0.15);
      color: #b583e6;
      border: 1px solid rgba(144, 53, 212, 0.3);
    }

    .btn-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #89f7fe;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.3s ease;
    }
    .btn-link:hover { transform: translateX(5px); }

    /* Loader */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
      color: var(--text-secondary);
      font-size: 18px;
    }
    .loader-container i { font-size: 40px; margin-bottom: 20px; color: #89f7fe; }

    @media (max-width: 768px) {
      .header h1 { font-size: 36px; }
      .container { padding: 80px 20px 40px 20px; }
    }
  </style>
</head>
<body>
  <!-- Background Animation -->
  <div class="aurora-background">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
  </div>

  <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Main</a>

  <main class="container">
    <div class="header">
      <h1>Research Publications</h1>
      <p>Documentation and papers about large language models, prompt engineering experiments, and reproducible AI research outputs from Zenodo.</p>
    </div>

    <div id="research-grid" class="research-grid">
      <div class="loader-container">
        <i class="fas fa-circle-notch fa-spin"></i>
        <p>Fetching publications from Zenodo...</p>
      </div>
    </div>
  </main>

  <script>
    // System Theme Setup
    const setInitialTheme = () => {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
      } else if (!savedTheme && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.body.classList.add('light-mode');
      }
    };
    setInitialTheme();

    // Fetch Zenodo Publications
    async function fetchResearch() {
      const grid = document.getElementById('research-grid');
      try {
        // limit size to 25 because Zenodo doesn't allow more than 25 without authentication
        const response = await fetch('https://zenodo.org/api/records?q=creators.name:"Taherkhani, Shayan"&sort=mostrecent&size=25');
        if (!response.ok) throw new Error('Failed to fetch Zenodo records');
        
        const data = await response.json();
        const hits = data.hits.hits;

        if (!hits || hits.length === 0) {
          grid.innerHTML = `
            <div class="loader-container" style="opacity: 0.8;">
              <i class="fas fa-book" style="color: var(--text-secondary);"></i>
              <p>No publications found found on Zenodo yet.</p>
              <a href="https://www.researchgate.net/profile/Shayan-Taherkhani" target="_blank" style="color: #89f7fe; text-decoration: none; margin-top: 15px;">Check my ResearchGate profile <i class="fas fa-arrow-right"></i></a>
            </div>
          `;
          return;
        }

        grid.innerHTML = ''; // Clear loader

        hits.forEach(hit => {
          const title = hit.metadata.title;
          const url = hit.links.html;
          const pubDate = hit.metadata.publication_date;
          const type = hit.metadata.resource_type.title || 'Publication';
          const description = hit.metadata.description.replace(/<[^>]*>?/gm, '').substring(0, 200) + '...'; // Strip HTML, truncate
          const doi = hit.metadata.doi;
          
          const card = document.createElement('div');
          card.className = 'research-card';
          
          card.innerHTML = `
            <a href="${url}" target="_blank" class="research-title">${title}</a>
            <div class="research-meta">
              <span><i class="far fa-calendar-alt"></i> ${pubDate}</span>
              ${doi ? `<span><i class="fas fa-link"></i> DOI: ${doi}</span>` : ''}
            </div>
            <p class="research-abstract">${description}</p>
            <div class="research-footer">
              <span class="badge"><i class="fas fa-tag" style="margin-right: 5px;"></i>${type}</span>
              <a href="${url}" target="_blank" class="btn-link">Read Full <i class="fas fa-arrow-right"></i></a>
            </div>
          `;
          
          // Slight delay for stagger effect
          setTimeout(() => grid.appendChild(card), 50);
        });

      } catch(error) {
        console.error('Error fetching Zenodo:', error);
        grid.innerHTML = `
          <div class="loader-container">
            <i class="fas fa-exclamation-circle" style="color: #ff6b6b;"></i>
            <p>Could not load publications at this time.</p>
            <a href="https://www.researchgate.net/profile/Shayan-Taherkhani" target="_blank" style="color: #89f7fe; text-decoration: none; margin-top: 15px;">Fallback to ResearchGate <i class="fas fa-arrow-right"></i></a>
          </div>
        `;
      }
    }

    // Initialize API call
    fetchResearch();
  </script>
</body>
</html>
