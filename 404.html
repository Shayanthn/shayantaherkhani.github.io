<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>۴۰۴ — صفحه پیدا نشد | شایان طاهرخانی</title>
  <meta name="description" content="صفحه موردنظر یافت نشد. به صفحهٔ اصلی بازگردید یا از جستجو استفاده کنید." />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0D0D0F;--card:rgba(22,24,28,0.9);--accent:#10b981;--muted:#A1A1A6;--text:#F5F5F7}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:radial-gradient(ellipse at 20% 10%, rgba(16,185,129,0.06), transparent 10%), var(--bg);color:var(--text);font-family:'Vazirmatn',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--card);border:1px solid rgba(255,255,255,0.04);padding:36px;border-radius:18px;max-width:920px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.6);position:relative;overflow:hidden}
    .code{font-size:5.5rem;font-weight:800;color:var(--accent);letter-spacing:6px}
    h1{font-size:1.5rem;margin-top:8px;color:var(--text)}
    p{color:var(--muted);margin-top:12px;line-height:1.7}
    .actions{margin-top:22px;display:flex;gap:12px;flex-wrap:wrap}
    .btn{background:linear-gradient(90deg,var(--accent),#34D399);color:#000;padding:12px 18px;border-radius:10px;text-decoration:none;font-weight:700;box-shadow:0 6px 18px rgba(16,185,129,0.12);transition:transform .18s ease,box-shadow .18s ease}
    .btn:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(16,185,129,0.14)}
    .ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--text);padding:10px 16px;border-radius:10px;text-decoration:none}
    .anim-bg{position:absolute;right:-10%;top:-20%;width:60vmax;height:60vmax;background:conic-gradient(from 120deg at 50% 50%, rgba(16,185,129,0.06), transparent 25%);filter:blur(30px);transform:rotate(25deg);opacity:.9}
    .floating{position:absolute;left:-6%;bottom:-10%;width:40vmax;height:40vmax;background:linear-gradient(135deg,rgba(16,185,129,0.06),rgba(52,211,153,0.02));filter:blur(40px);border-radius:50%;animation:float 6s ease-in-out infinite}
    @keyframes float{0%{transform:translateY(0) translateX(0)}50%{transform:translateY(-18px) translateX(8px)}100%{transform:translateY(0) translateX(0)}}
    .meta{position:absolute;left:18px;top:18px;color:var(--muted);font-size:0.85rem}
    @media (max-width:600px){.code{font-size:3.6rem}.card{padding:24px}}
  </style>
</head>
<body>
  <div class="card" role="main" aria-labelledby="title">
    <div class="anim-bg" aria-hidden="true"></div>
    <div class="floating" aria-hidden="true"></div>
    <div class="meta">شایان طاهرخانی — سایت</div>
    <div style="display:flex;gap:28px;align-items:center;flex-wrap:wrap">
      <div class="code">۴۰۴</div>
      <div>
        <h1 id="title">اوه! صفحه‌ای که دنبال آن بودید یافت نشد.</h1>
        <p>ممکن است آدرس تغییر کرده یا صفحه حذف شده باشد. با دکمهٔ زیر به صفحهٔ اصلی بازگردید یا از جستجو استفاده کنید.</p>
        <div class="actions">
          <a class="btn" href="/">بازگشت به صفحه اصلی</a>
          <a class="ghost" href="/">جستجو در سایت</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
