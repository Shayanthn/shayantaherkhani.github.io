<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Shayan Taherkhani</title>
  <meta name="robots" content="noindex, follow" />
  
  <meta name="theme-color" content="#0D0D0F" />
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg-color: #0D0D0F;
      --card-background: rgba(22, 24, 28, 0.55);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-primary: #F5F5F7;
      --text-secondary: #A1A1A6;
      --accent-hover: rgba(255, 255, 255, 0.08);
      --card-glow: 0 0 50px rgba(144, 53, 212, 0.15), 0 0 20px rgba(69, 97, 219, 0.15);
      --font-heading: 'Cinzel', serif;
      --font-body: 'Manrope', sans-serif;
    }
    body.light-mode {
      --bg-color: #F0F2F5;
      --card-background: rgba(255, 255, 255, 0.6);
      --border-color: rgba(0, 0, 0, 0.15);
      --text-primary: #1D1D1F;
      --text-secondary: #424245;
      --card-glow: 0 0 50px rgba(0, 0, 0, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      overflow: hidden;
      position: relative;
      transition: background-color 0.4s ease;
    }
    
    .aurora-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .aurora-background .shape { position: absolute; border-radius: 50%; filter: blur(120px); }
    .shape-1 { width: 450px; height: 450px; top: -50px; left: -100px; background: radial-gradient(circle, rgba(69, 97, 219, 0.3) 0%, rgba(69, 97, 219, 0) 70%); animation: move-1 20s infinite alternate; }
    .shape-2 { width: 400px; height: 400px; bottom: -80px; right: -120px; background: radial-gradient(circle, rgba(144, 53, 212, 0.3) 0%, rgba(144, 53, 212, 0) 70%); animation: move-2 25s infinite alternate-reverse; }
    @keyframes move-1 { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(150px, 50px) rotate(60deg); } }
    @keyframes move-2 { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(-100px, -50px) rotate(-40deg); } }

    .glass-card {
      background: var(--card-background);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 60px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: var(--card-glow);
      animation: fadeIn 0.8s 0.1s ease-out forwards;
      opacity: 0;
    }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    h1 { font-family: var(--font-heading); font-size: 80px; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); text-shadow: 0 0 20px rgba(69, 97, 219, 0.5); }
    h2 { font-size: 24px; margin-bottom: 20px; color: var(--text-primary); }
    p { color: var(--text-secondary); font-size: 16px; margin-bottom: 35px; }

    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(255, 255, 255, 0.05); color: var(--text-primary);
      text-decoration: none; padding: 12px 24px; border-radius: 12px;
      border: 1px solid var(--border-color); font-weight: 500;
      transition: all 0.3s;
    }
    .btn:hover { background: var(--accent-hover); transform: translateY(-3px); }
  </style>
</head>
<body>

  <div class="aurora-background">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
  </div>

  <div class="glass-card">
    <h1>404</h1>
    <h2>Lost in the Digital Void</h2>
    <p>The page you are looking for has been moved, deleted, or never existed in the first place.</p>
    <a href="/" class="btn"><i class="fas fa-home"></i> Return Home</a>
  </div>

  <script>
    const isLightMode = localStorage.getItem('theme') === 'light' || 
                        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: light)').matches);
    if (isLightMode) document.body.classList.add('light-mode');
  </script>
</body>
</html>
