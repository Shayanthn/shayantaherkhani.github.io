<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>۵۰۳ — سرویس در دسترس نیست | شایان طاهرخانی</title>
  <meta name="description" content="سرویس موقتاً در دسترس نیست. لطفاً چند دقیقه بعد دوباره بررسی کنید." />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#081018;--card:rgba(20,22,26,0.92);--accent:#f472b6;--muted:#94a3b8;--text:#F7F9FB}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(180deg,#05050a,#081018);color:var(--text);font-family:'Vazirmatn',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--card);padding:36px;border-radius:14px;max-width:880px;width:100%;position:relative;box-shadow:0 16px 50px rgba(0,0,0,0.6)}
    .code{font-size:4.8rem;color:var(--accent);font-weight:900}
    h1{font-size:1.35rem}
    p{color:var(--muted);margin-top:10px}
    .dots{display:inline-block;margin-left:8px;vertical-align:middle}
    .dot{width:8px;height:8px;background:rgba(244,114,182,0.9);display:inline-block;border-radius:50%;margin:0 4px;animation:blink 1s infinite}
    .dot:nth-child(2){animation-delay:.12s}.dot:nth-child(3){animation-delay:.24s}
    @keyframes blink{0%{opacity:0.18;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}100%{opacity:0.18;transform:translateY(0)}}
    .btn{display:inline-block;margin-top:16px;padding:12px 16px;border-radius:10px;background:linear-gradient(90deg,#f472b6,#fb7185);color:#061018;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="card" role="main">
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
      <div class="code">۵۰۳</div>
      <div>
        <h1>سرویس موقتاً در دسترس نیست</h1>
        <p>داریم روی رفع مشکل کار می‌کنیم. لطفاً چند دقیقه بعد دوباره تلاش کنید<span class="dots" aria-hidden="true"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></p>

        <form action="/" method="get" role="search" aria-label="جستجوی سایت" style="margin-top:12px;display:flex;gap:8px;max-width:480px">
          <input name="s" type="search" placeholder="جستجو در سایت..." aria-label="جستجو" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text)">
          <button type="submit" class="btn">جستجو</button>
        </form>

        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <a class="btn" href="/">بازگشت به صفحه اصلی</a>
          <a class="ghost" href="/">وضعیت سیستم</a>
          <a class="ghost" href="mailto:admin@shayantaherkhani.ir">گزارش مشکل</a>
        </div>
      </div>
    </div>

    <div aria-hidden="true" style="position:absolute;right:18px;top:18px;">
      <svg width="56" height="56" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="12" stroke="#f472b6" stroke-width="2" fill="rgba(244,114,182,0.02)"></circle>
        <path d="M18 24h12" stroke="#f472b6" stroke-width="1.6" stroke-linecap="round">
          <animate attributeName="stroke-dasharray" values="0 24;12 12;0 24" dur="2.2s" repeatCount="indefinite"/>
        </path>
      </svg>
    </div>
  </div>
</body>
</html>
