<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>۵۰۰ — خطای سرور | شایان طاهرخانی</title>
  <meta name="description" content="خطای داخلی سرور. تیم ما در حال بررسی است — لطفاً بعداً تلاش کنید." />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0B1020;--card:linear-gradient(180deg,rgba(14,18,25,0.9),rgba(22,24,28,0.9));--accent:#ef4444;--muted:#9CA3AF;--text:#F8FAFC}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Vazirmatn',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--card);padding:36px;border-radius:16px;max-width:880px;width:100%;position:relative;overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,0.6)}
    .code{font-size:5rem;font-weight:900;color:var(--accent)}
    h1{font-size:1.4rem}
    p{color:var(--muted);margin-top:10px}
    .pulse{position:absolute;right:-10%;bottom:-10%;width:40vmax;height:40vmax;background:radial-gradient(circle, rgba(239,68,68,0.06), transparent 30%);border-radius:50%;animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:.6}100%{transform:scale(1);opacity:.9}}
    .btn{display:inline-block;margin-top:18px;padding:12px 16px;border-radius:10px;background:linear-gradient(90deg,#ef4444,#f97316);color:#000;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="pulse" aria-hidden="true"></div>
    <div style="display:flex;gap:22px;align-items:center;flex-wrap:wrap">
      <div class="code">۵۰۰</div>
      <div>
        <h1>خطای داخلی سرور</h1>
        <p>متاسفیم — مشکلی در سرور پیش آمده و تیم فنی در حال رفع آن است. لطفاً چند دقیقه بعد دوباره تلاش کنید.</p>

        <form action="/" method="get" role="search" aria-label="جستجوی سایت" style="margin-top:12px;display:flex;gap:8px;max-width:480px">
          <input name="s" type="search" placeholder="جستجو در سایت..." aria-label="جستجو" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text)">
          <button type="submit" class="btn">جستجو</button>
        </form>

        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <a class="btn" href="/">رفتن به صفحه اصلی</a>
          <a class="ghost" href="/">وضعیت سایت</a>
          <a class="ghost" href="mailto:admin@shayantaherkhani.ir">تماس پشتیبانی</a>
        </div>
      </div>
    </div>

    <div aria-hidden="true" style="position:absolute;left:18px;bottom:18px;">
      <svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="32" height="32" rx="8" stroke="#ef4444" stroke-width="2" fill="rgba(239,68,68,0.02)"></rect>
        <path d="M16 24h16" stroke="#ef4444" stroke-width="1.6" stroke-linecap="round">
          <animate attributeName="stroke-dashoffset" from="0" to="32" dur="1.6s" repeatCount="indefinite"/>
        </path>
      </svg>
    </div>
  </div>
</body>
</html>
