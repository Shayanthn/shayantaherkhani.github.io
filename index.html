  <!-- CSS Critical Path Optimization -->
  <style>
    /* Critical CSS - Above the fold styles */
    :root {
      /* Dark Mode (Default) */
      --bg-color: #0D0D0F;
      --card-background: rgba(22, 24, 28, 0.55);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-primary: #F5F5F7;
      --text-secondary: #A1A1A6;
      --accent-hover: rgba(255, 255, 255, 0.08);
      --card-glow: 0 0 50px rgba(144, 53, 212, 0.15), 0 0 20px rgba(69, 97, 219, 0.15);
      --font-heading: 'Cinzel', serif;
      --font-body: 'Manrope', sans-serif;
    }
    
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-body);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
      overflow: auto;
      position: relative;
      perspective: 1500px;
      transition: background-color 0.4s ease;
      /* Performance optimizations */
      will-change: background-color;
      transform: translateZ(0);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .glass-card {
      background: var(--card-background);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: var(--card-glow);
      transition: transform 0.2s ease-out, background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      will-change: transform;
      animation: fadeIn 1s 0.2s ease-out forwards;
      opacity: 0;
      /* Performance optimizations */
      contain: layout style paint;
      transform: translateZ(0);
    }
    
    @keyframes fadeIn { 
      from { 
        opacity: 0; 
        transform: translateY(30px) translateZ(0); 
      } 
      to { 
        opacity: 1; 
        transform: translateY(0) translateZ(0); 
      } 
    }
    
    .avatar {
      width: 80px; 
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--border-color);
      margin: 0 auto 20px;
      object-fit: cover;
      background-color: rgba(255,255,255,0.05);
      /* Performance optimizations */
      will-change: auto;
      transform: translateZ(0);
    }
    
    h1 {
      font-family: var(--font-heading);
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 12px;
      transition: color 0.4s ease;
      /* Performance optimizations */
      contain: layout;
    }
    
    p.bio {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 30px;
      transition: color 0.4s ease;
    }
  </style>
  
  <!-- Non-critical CSS loaded after page load -->
  <style>
    /* Light Mode Theme */
    body.light-mode {
      --bg-color: #F0F2F5;
      --card-background: rgba(255, 255, 255, 0.5);
      --border-color: rgba(0, 0, 0, 0.1);
      --text-primary: #1D1D1F;
      --text-secondary: #515154;
      --accent-hover: rgba(0, 0, 0, 0.05);
      --card-glow: 0 0 50px rgba(0, 0, 0, 0.1);
    }
    
    /* Aurora Background Effects */
    .aurora-background {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      z-index: -1;
      will-change: transform;
      contain: strict;
    }
    
    .aurora-background .shape {
      position: absolute; 
      border-radius: 50%; 
      filter: blur(120px);
      transition: transform 0.2s ease-out;
      will-change: transform;
      contain: layout paint;
    }
    
    .shape.shape-1 {
      width: 450px; 
      height: 450px;
      top: -50px; 
      left: -100px;
      background: radial-gradient(circle, rgba(69, 97, 219, 0.4) 0%, rgba(69, 97, 219, 0) 70%);
      animation: move-1 20s infinite alternate;
    }
    
    .shape.shape-2 {
      width: 400px; 
      height: 400px;
      bottom: -80px; 
      right: -120px;
      background: radial-gradient(circle, rgba(144, 53, 212, 0.4) 0%, rgba(144, 53, 212, 0) 70%);
      animation: move-2 25s infinite alternate-reverse;
    }
    
    @keyframes move-1 { 
      from { transform: translate(0, 0) rotate(0deg) translateZ(0); } 
      to { transform: translate(150px, 50px) rotate(60deg) translateZ(0); } 
    }
    
    @keyframes move-2 { 
      from { transform: translate(0, 0) rotate(0deg) translateZ(0); } 
      to { transform: translate(-100px, -50px) rotate(-40deg) translateZ(0); } 
    }
    
    /* Link Styles and Effects */
    .link-container { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 15px; 
      contain: layout;
    }
    
    .link {
      position: relative;
      background: transparent;
      border-radius: 12px;
      padding: 14px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 10px;
      border: 1px solid var(--border-color);
      transition: background 0.2s ease, transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
      overflow: hidden;
      contain: layout style paint;
      transform: translateZ(0);
    }
    
    .link::before {
      content: '';
      position: absolute;
      width: 150%; 
      height: 150%;
      background: conic-gradient(from var(--angle), transparent 0%, #89f7fe 10%, #66a6ff 40%, #ff00c1 80%, transparent 100%);
      animation: rotate 4s linear infinite;
      opacity: 0;
      transition: opacity 0.3s ease;
      will-change: transform;
    }
    
    .link:hover::before { 
      opacity: 0.5; 
    }
    
    .link .content {
      position: relative;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 10px;
      width: 100%; 
      height: 100%;
      background: var(--card-background);
      border-radius: 11px;
      contain: layout style;
    }
    
    @property --angle { 
      syntax: '<angle>'; 
      inherits: false; 
      initial-value: 0deg; 
    }
    
    @keyframes rotate { 
      to { --angle: 360deg; } 
    }
    
    /* Footer and Theme Toggle */
    footer {
      margin-top: 30px; 
      font-size: 11px; 
      color: var(--text-secondary); 
      opacity: 0.7; 
      transition: color 0.4s ease;
      contain: layout;
    }
    
    footer .company { 
      font-size: 10px; 
    }
    
    .theme-toggle {
      position: absolute; 
      top: 25px; 
      right: 25px;
      background: var(--card-background); 
      border: 1px solid var(--border-color);
      width: 40px; 
      height: 40px; 
      border-radius: 50%;
      cursor: pointer; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      backdrop-filter: blur(10px); 
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      will-change: transform;
      contain: layout style paint;
      transform: translateZ(0);
    }
    
    .theme-toggle:hover { 
      transform: scale(1.1) translateZ(0); 
    }
    
    .theme-toggle .fa-sun { 
      display: none; 
    }
    
    body.light-mode .theme-toggle .fa-sun { 
      display: block; 
    }
    
    body.light-mode .theme-toggle .fa-moon { 
      display: none; 
    }
    
    /* Mobile Responsive Design */
    @media (max-width: 480px) {
      .glass-card { 
        padding: 30px 20px; 
      }
      
      .avatar { 
        width: 70px; 
        height: 70px;

      .link-container {

      .link {

      }
      
      .theme-toggle { 
        top: 20px; 
        right: 20px; 
      }
    }
    
    /* Accessibility improvements */
    @media (prefers-reduced-motion: reduce) {
      .aurora-background .shape {
        animation: none;
      }
      
      .link::before {
        animation: none;
      }
      
      .glass-card {
        animation: none;
        opacity: 1;
      }
    }
    
    /* High contrast mode support */
    @media (prefers-contrast: high) {
      :root {
        --border-color: rgba(255, 255, 255, 0.3);
        --text-primary: #FFFFFF;
        --text-secondary: #E0E0E0;
      }
    }
  </style>

  <!-- Optimized JavaScript -->
  <script>
    // Performance-optimized interactive effects
    document.addEventListener('DOMContentLoaded', () => {
      const card = document.querySelector('.glass-card');
      const shapes = document.querySelectorAll('.shape');
      const links = document.querySelectorAll('.link');
      const themeToggle = document.querySelector('.theme-toggle');
      
      // Throttled mouse move handler for better performance
      let ticking = false;
      
      const handleMouseMove = (e) => {
        if (!ticking) {
          requestAnimationFrame(() => {
            updateCardTransform(e);
            updateShapePositions(e);
            magneticLinks(e);
            ticking = false;
          });
          ticking = true;
        }
      };
      
      const updateCardTransform = (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -3.5;
        const rotateY = ((x - centerX) / centerX) * 3.5;
        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(0)`;
      };
      
      const updateShapePositions = (e) => {
        shapes.forEach(shape => {
          const speed = parseFloat(shape.getAttribute('data-speed'));
          const moveX = (window.innerWidth / 2 - e.clientX) * speed;
          const moveY = (window.innerHeight / 2 - e.clientY) * speed;
          shape.style.transform = `translate(${moveX}px, ${moveY}px) translateZ(0)`;
        });
      };
      
      const magneticLinks = (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        
        links.forEach(link => {
          const rect = link.getBoundingClientRect();
          const linkCenterX = rect.left + rect.width / 2;
          const linkCenterY = rect.top + rect.height / 2;
          const distance = Math.sqrt(Math.pow(mouseX - linkCenterX, 2) + Math.pow(mouseY - linkCenterY, 2));
          const maxDistance = 120;
          
          if (distance < maxDistance) {
            const pullFactor = 1 - (distance / maxDistance);
            const pullX = (mouseX - linkCenterX) * 0.3 * pullFactor;
            const pullY = (mouseY - linkCenterY) * 0.3 * pullFactor;
            link.style.transform = `translate(${pullX}px, ${pullY}px) translateZ(0)`;
          } else {
            link.style.transform = 'translate(0, 0) translateZ(0)';
          }
        });
      };
      
      // Event listeners with passive option for better performance
      document.body.addEventListener('mousemove', handleMouseMove, { passive: true });
      
      document.body.addEventListener('mouseleave', () => {
        card.style.transform = 'rotateX(0) rotateY(0) translateZ(0)';
        links.forEach(link => {
          link.style.transform = 'translate(0, 0) translateZ(0)';
        });
      }, { passive: true });
      
      // Theme toggle functionality with localStorage
      const initializeTheme = () => {
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
          document.body.classList.add('light-mode');
        }
      };
      
      const toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        const theme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
        localStorage.setItem('theme', theme);
      };
      
      // Initialize theme on load
      initializeTheme();
      
      // Theme toggle event listener
      themeToggle.addEventListener('click', toggleTheme, { passive: true });
      
      // Accessibility: keyboard navigation for theme toggle
      themeToggle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggleTheme();
        }
      });
      
      // Performance: Reduce animations on low-end devices
      const reduceMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
      if (reduceMotionQuery.matches) {
        document.body.style.setProperty('--animation-duration', '0s');
      }
      
      // Intersection Observer for lazy loading effects
      const observerOptions = {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
      };
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, observerOptions);
      
      // Observe elements for animations
      document.querySelectorAll('.link').forEach(link => {
        observer.observe(link);
      });
      
      // Preload critical resources
      const preloadImage = (src) => {
        const img = new Image();
        img.src = src;
      };
      
      // Preload avatar image
      preloadImage('./avatar.png');
    });
    
    // Google Analytics or any tracking code would go here
    // Performance monitoring
    if ('performance' in window) {
      window.addEventListener('load', () => {
        setTimeout(() => {
          const perfData = performance.getEntriesByType('navigation')[0];
          if (perfData) {
            console.log('Page Load Time:', perfData.loadEventEnd - perfData.loadEventStart, 'ms');
          }
        }, 0);
      });
    }
  </script>
