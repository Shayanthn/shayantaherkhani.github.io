<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>۴۱۰ — حذف شده | شایان طاهرخانی</title>
  <meta name="description" content="محتوای درخواستی برای همیشه حذف شده است." />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0B0B0E;--card:rgba(18,18,20,0.92);--accent:#f59e0b;--muted:#9CA3AF;--text:#F7F7F8}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(180deg,#050506,#0b0b0e);color:var(--text);font-family:'Vazirmatn',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--card);padding:36px;border-radius:14px;max-width:840px;width:100%;position:relative;box-shadow:0 14px 40px rgba(0,0,0,0.6)}
    .code{font-size:4.6rem;color:var(--accent);font-weight:900}
    h1{font-size:1.35rem}
    p{color:var(--muted);margin-top:10px}
    .btn{display:inline-block;margin-top:16px;padding:12px 16px;border-radius:10px;background:linear-gradient(90deg,#f59e0b,#f97316);color:#07100b;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="card" role="main">
    <div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
      <div class="code">۴۱۰</div>
      <div>
        <h1>محتوا برای همیشه حذف شده است.</h1>
        <p>محتوایی که به دنبال آن بودید دیگر در دسترس نیست و به طور دائمی حذف شده است.</p>

        <form action="/" method="get" role="search" aria-label="جستجوی سایت" style="margin-top:12px;display:flex;gap:8px;max-width:480px">
          <input name="s" type="search" placeholder="جستجو در سایت..." aria-label="جستجو" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text)">
          <button type="submit" class="btn">جستجو</button>
        </form>

        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <a class="btn" href="/">رفتن به صفحه اصلی</a>
          <a class="ghost" href="/">فهرست مقالات</a>
          <a class="ghost" href="mailto:admin@shayantaherkhani.ir">تماس</a>
        </div>
      </div>
    </div>

    <div aria-hidden="true" style="position:absolute;left:18px;top:18px;">
      <svg width="56" height="56" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="12" stroke="#f59e0b" stroke-width="2" fill="rgba(245,158,11,0.02)"></circle>
        <path d="M18 18l12 12M30 18L18 30" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
        </path>
      </svg>
    </div>
  </div>
</body>
</html>
